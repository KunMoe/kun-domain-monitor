# Build the app + migrate images, push to GHCR, then trigger a Dokploy redeploy.
# Modeled on ../kun-galgame-infra/docs/deploy/13-registry-ci.md.
name: build-and-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/kunmoe/kun-domain-monitor

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # App (run) image -> :latest + :<sha>
      - name: Build & push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: run
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=domain-monitor
          cache-to: type=gha,mode=max,scope=domain-monitor

      # Migrate image -> :migrate + :migrate-<sha> (reuses cached build layers)
      - name: Build & push migrate image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: migrate
          push: true
          tags: |
            ${{ env.IMAGE }}:migrate
            ${{ env.IMAGE }}:migrate-${{ github.sha }}
          cache-from: type=gha,scope=domain-monitor
          cache-to: type=gha,mode=max,scope=domain-monitor

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy redeploy
        env:
          WEBHOOK: ${{ secrets.DOKPLOY_WEBHOOK_KUN_DOMAIN_MONITOR }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "DOKPLOY_WEBHOOK_KUN_DOMAIN_MONITOR not set — images pushed, skipping redeploy."
            exit 0
          fi
          curl -fsS -X POST "$WEBHOOK"
